id = "vellum.sdk-example.timer"
name = "MoonBit SDK Timer"
version = "0.1.0"
schema_version = 1
authors = ["Vellum"]
description = "Timer example built with MoonBit and host timer imports"

[wasm]
component = "target/wasm32-wasip2/release/vellum_sdk_example_timer.wasm"

[activation]
events = []

[capabilities]
panels = true
commands = true
timers = true

[[contributes.commands]]
id = "timer.start-pause"
title = "Timer: Start/Pause"

[[contributes.commands]]
id = "timer.reset"
title = "Timer: Reset"

[[contributes.commands]]
id = "timer.skip"
title = "Timer: Skip"

[[contributes.panels]]
id = "timer"
title = "Timer"
icon = "clock"
location = "right"

