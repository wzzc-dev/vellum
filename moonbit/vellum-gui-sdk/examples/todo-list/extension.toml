id = "vellum.sdk-example.todo-list"
name = "MoonBit SDK Todo List"
version = "0.1.0"
schema_version = 1
authors = ["Vellum"]
description = "Todo list example built with MoonBit"

[wasm]
component = "target/wasm32-wasip2/release/vellum_sdk_example_todo_list.wasm"

[activation]
events = []

[capabilities]
panels = true
commands = true

[[contributes.commands]]
id = "todo-list.add"
title = "Todo List: Add"

[[contributes.commands]]
id = "todo-list.clear-completed"
title = "Todo List: Clear Completed"

[[contributes.panels]]
id = "todo-list"
title = "Todo List"
icon = "check-square"
location = "right"

