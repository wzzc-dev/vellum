id = "vellum.sdk-example.navigation"
name = "MoonBit SDK Navigation"
version = "0.1.0"
schema_version = 1
authors = ["Vellum"]
description = "Navigation state example built with MoonBit"

[wasm]
component = "target/wasm32-wasip2/release/vellum_sdk_example_navigation.wasm"

[activation]
events = []

[capabilities]
panels = true
commands = true

[[contributes.commands]]
id = "navigation.home"
title = "Navigation: Home"

[[contributes.commands]]
id = "navigation.back"
title = "Navigation: Back"

[[contributes.panels]]
id = "navigation"
title = "Navigation"
icon = "navigation"
location = "right"

