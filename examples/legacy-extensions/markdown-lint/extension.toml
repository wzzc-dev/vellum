id = "vellum.markdown-lint"
name = "Markdown Lint"
version = "0.1.0"
schema_version = 1
authors = ["Vellum"]
description = "Checks Markdown documents for common issues"
repository = ""

[wasm]
# This example is a workspace member, so `cargo build -p vellum-markdown-lint`
# writes the component under the workspace root target directory.
component = "../../target/wasm32-wasip2/release/vellum_markdown_lint.wasm"

[activation]
events = ["document.opened", "document.changed"]

[capabilities]
document_read = true
document_write = true
decorations = true
panels = true
commands = true

[[contributes.commands]]
id = "markdown-lint.run"
title = "Run Markdown Lint"
key = "cmd-shift-l"

[[contributes.commands]]
id = "markdown-lint.clear"
title = "Clear Lint Results"

[[contributes.panels]]
id = "markdown-lint"
title = "Lint"
icon = "triangle-alert"
location = "right"
