name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact_name: vellum
            artifact_dir: target/aarch64-apple-darwin/release
            archive_name: vellum-aarch64-apple-darwin.tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            artifact_name: vellum
            artifact_dir: target/x86_64-apple-darwin/release
            archive_name: vellum-x86_64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact_name: vellum.exe
            artifact_dir: target/x86_64-pc-windows-msvc/release
            archive_name: vellum-x86_64-pc-windows-msvc.zip
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact_name: vellum
            artifact_dir: target/x86_64-unknown-linux-gnu/release
            archive_name: vellum-x86_64-unknown-linux-gnu.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libxkbcommon-x11-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build WASM plugin
        run: cargo build -p vellum-markdown-lint --target wasm32-unknown-unknown --release

      - name: Build Vellum
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Pack (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive_name }} -C ${{ matrix.artifact_dir }} ${{ matrix.artifact_name }}

      - name: Pack (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.artifact_dir }}/${{ matrix.artifact_name }}" -DestinationPath ${{ matrix.archive_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vellum-${{ matrix.target }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
