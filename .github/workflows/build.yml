name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact_name: vellum
            artifact_path: target/aarch64-apple-darwin/release/vellum
          - target: x86_64-apple-darwin
            runner: macos-13
            artifact_name: vellum
            artifact_path: target/x86_64-apple-darwin/release/vellum
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact_name: vellum.exe
            artifact_path: target/x86_64-pc-windows-msvc/release/vellum.exe
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact_name: vellum
            artifact_path: target/x86_64-unknown-linux-gnu/release/vellum

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build WASM plugin
        run: cargo build -p vellum-markdown-lint --target wasm32-unknown-unknown --release

      - name: Build Vellum
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vellum-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
